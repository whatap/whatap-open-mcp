name: MCP Protocol Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  mcp-protocol:
    name: MCP Protocol Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Run MCP protocol tests
        env:
          WHATAP_API_TOKEN: ${{ secrets.WHATAP_API_TOKEN }}
        run: npx tsx tests/mcp-protocol/test.ts
