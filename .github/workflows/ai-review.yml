name: AI Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > /tmp/pr-diff.txt
          DIFF_SIZE=$(wc -c < /tmp/pr-diff.txt | tr -d ' ')
          echo "diff_size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"
          echo "Diff size: $DIFF_SIZE bytes"

      - name: Skip if empty diff
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No changes to review" && exit 0

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run AI review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Build review prompt with the diff inlined
          DIFF_CONTENT=$(head -c 30000 /tmp/pr-diff.txt)

          REVIEW_PROMPT="You are reviewing the whatap-open-mcp project — an MCP server bridging AI assistants to WhaTap monitoring (10 tools, 640+ MXQL catalog entries, zero-dependency MCP impl).

          Review the following PR diff. Check for:
          1. MXQL CORRECTNESS: field must be mql not mxql, param not params, pageKey required, TAGLOAD must follow CATEGORY, case-sensitive fields, Unix ms times
          2. RESPONSE QUALITY: tool descriptions guide LLM workflow efficiently, errors include next steps, format functions preserve units
          3. SECURITY: no token exposure, no command injection, input validation
          4. REGRESSIONS: tool count >= 10, catalog >= 640, no removed exports

          Output your review as markdown with: ## Summary, ## Findings (each as [CRITICAL|WARNING|INFO]: description), ## Verdict (APPROVE or REQUEST_CHANGES with reason).

          Here is the diff:

          \`\`\`diff
          ${DIFF_CONTENT}
          \`\`\`"

          # Use codex exec to run the review (non-interactive)
          codex exec \
            --dangerously-bypass-approvals-and-sandbox \
            -o /tmp/review-result.txt \
            "$REVIEW_PROMPT" || true

          # Fallback if output is empty
          if [[ ! -s /tmp/review-result.txt ]]; then
            echo "Review completed but no structured output captured." > /tmp/review-result.txt
          fi

          # Determine verdict from output
          if grep -qi "REQUEST_CHANGES" /tmp/review-result.txt; then
            echo "verdict=request_changes" >> "$GITHUB_ENV"
          else
            echo "verdict=approve" >> "$GITHUB_ENV"
          fi

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = 'Review output not available.';
            if (fs.existsSync('/tmp/review-result.txt')) {
              review = fs.readFileSync('/tmp/review-result.txt', 'utf8');
            }
            const verdict = process.env.verdict || 'approve';
            const emoji = verdict === 'approve' ? ':white_check_mark:' : ':warning:';

            const body = `## ${emoji} AI Code Review\n\n${review}\n\n---\n_Reviewed by Codex CLI_`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            if (verdict === 'request_changes') {
              core.setFailed('AI review requested changes. See PR comment for details.');
            }
