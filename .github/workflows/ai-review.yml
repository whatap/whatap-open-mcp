name: AI Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- ':!dist/' ':!package-lock.json' > /tmp/pr-diff.txt
          DIFF_SIZE=$(wc -c < /tmp/pr-diff.txt | tr -d ' ')
          echo "diff_size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"
          echo "Diff size: $DIFF_SIZE bytes (excluding dist/ and lock files)"

      - name: Skip if empty diff
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No changes to review" && exit 0

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run AI review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Truncate diff to keep prompt reasonable
          head -c 15000 /tmp/pr-diff.txt > /tmp/pr-diff-truncated.txt

          # Build prompt file and pipe via stdin
          cat > /tmp/review-input.txt << 'INSTRUCTIONS'
          Review this whatap-open-mcp PR diff. This is an MCP server (10 tools, 640+ catalog entries, zero-dep MCP impl).

          Check for:
          1. MXQL CORRECTNESS: field "mql" not "mxql", "param" not "params", pageKey required, TAGLOAD after CATEGORY
          2. RESPONSE QUALITY: tool descriptions guide efficient LLM workflow, errors have next steps, units preserved
          3. SECURITY: no token exposure, no injection, input validation
          4. REGRESSIONS: tool count >= 10, catalog >= 640

          Output: ## Summary, ## Findings ([CRITICAL|WARNING|INFO]), ## Verdict (APPROVE or REQUEST_CHANGES).

          <diff>
          INSTRUCTIONS

          cat /tmp/pr-diff-truncated.txt >> /tmp/review-input.txt
          echo "" >> /tmp/review-input.txt
          echo "</diff>" >> /tmp/review-input.txt

          # Pipe prompt via stdin using -
          codex exec \
            --dangerously-bypass-approvals-and-sandbox \
            -o /tmp/review-result.txt \
            - < /tmp/review-input.txt || true

          # Fallback
          if [[ ! -s /tmp/review-result.txt ]]; then
            echo "AI review ran but produced no structured output." > /tmp/review-result.txt
          fi

          if grep -qi "REQUEST_CHANGES" /tmp/review-result.txt; then
            echo "verdict=request_changes" >> "$GITHUB_ENV"
          else
            echo "verdict=approve" >> "$GITHUB_ENV"
          fi

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = 'Review output not available.';
            if (fs.existsSync('/tmp/review-result.txt')) {
              review = fs.readFileSync('/tmp/review-result.txt', 'utf8');
            }
            const verdict = process.env.verdict || 'approve';
            const emoji = verdict === 'approve' ? ':white_check_mark:' : ':warning:';

            const body = `## ${emoji} AI Code Review\n\n${review}\n\n---\n_Reviewed by Codex CLI_`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            if (verdict === 'request_changes') {
              core.setFailed('AI review requested changes. See PR comment for details.');
            }
